<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro site com Imagem</title>
</head>
<body>
    <h1>Primeiro site com imagem</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta que o documento html.</p>
    <img src="logo-html.png" alt="Imagem da logo HTML5.">
    <br>
    <p>Podemos também, carregar imagens que estáo em sub-pastas.</p>
    <img src="imagens/logo-css.webp" alt="Imagem da logo das CSS.">
    <p>Também podemos carregar imagens externas.</p>
    <img src="https://storage.googleapis.com/qvault-webapp-dynamic-assets/course_assets/A8mpuSH.png" alt="Imagem da logo do java script.">
</body>
</html>
