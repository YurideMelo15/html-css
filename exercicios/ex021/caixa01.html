<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            
            border: 10px solid darkblue;

            padding: 10px;

            margin: 20px 20px 40px 20px;

            outline: 10px dashed red;
        }

        a {
            border: 10px solid darkblue;

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplos de caixas box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links faz parte de caixas inline-level</a></p>
</body>
</html>
